appId: com.bocchi.app
productName: Bocchi
directories:
  buildResources: build
fileAssociations:
  - ext: wad
    name: 'League of Legends WAD File'
    description: 'League of Legends WAD archive'
    role: Editor
  - ext: wad.client
    name: 'League of Legends Client WAD'
    description: 'League of Legends client WAD archive'
    role: Editor
  - ext: zip
    name: 'League Skin Archive'
    description: 'League of Legends skin mod archive'
    role: Editor
  - ext: fantome
    name: 'Fantome Skin File'
    description: 'Fantome mod file for League of Legends'
    role: Editor
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # The Rust sidecar's target/ directory is ~2.3 GB of build artifacts
  # (incrementals, dep sources, debug builds). Only the final exe is needed,
  # and that ships via `extraResources` below.
  - '!native/**'
asarUnpack:
  - resources/**
extraResources:
  # Native Rust sidecar — build with:
  #   cargo build --release --manifest-path native/bocchi-overlay/Cargo.toml
  # Resolves to `process.resourcesPath/ltk-manager.exe` at runtime.
  # The binary is named `ltk-manager.exe` (not bocchi-overlay.exe) because
  # cslol-dll hardcodes that host process name in its AH check. See
  # memory/cslol_dll_ah_check.md.
  - from: native/bocchi-overlay/target/release/ltk-manager.exe
    to: ltk-manager.exe
win:
  # Keep dev and packaged builds running under the same host binary name
  # so native sidecars behave identically in both. User-facing shortcut
  # name comes from nsis.shortcutName below.
  executableName: electron
  target:
    - nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: Bocchi-${version}-setup.${ext}
  shortcutName: Bocchi
  uninstallDisplayName: Bocchi - League of Legends Skin Changer
  createDesktopShortcut: always
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: false
  perMachine: false
  allowElevation: true
npmRebuild: false
publish:
  provider: github
  owner: hitori-rebocchi
  repo: hitori-bocchi
  releaseType: release
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
